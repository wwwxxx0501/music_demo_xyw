<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音乐曲库 Demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🎵</span>
        <span class="logo-text">音乐曲库 Demo</span>
      </div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="library">我的曲库</button>
        <button class="nav-tab" data-tab="search">搜索</button>
      </nav>
    </header>

    <!-- Main content -->
    <main class="main-content">

      <!-- ============ MY LIBRARY TAB ============ -->
      <section id="tab-library" class="tab-panel active">
        <!-- Upload area -->
        <div class="upload-section">
          <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-inner">
              <span class="drop-icon">📂</span>
              <p class="drop-title">拖拽音频文件到此处</p>
              <p class="drop-sub">支持 MP3 / AAC / M4A 格式</p>
              <label class="btn btn-primary pick-btn">
                选择文件
                <input type="file" id="file-input" accept=".mp3,.aac,.m4a" multiple hidden />
              </label>
            </div>
          </div>
          <div id="upload-progress" class="upload-progress hidden">
            <div class="progress-bar-wrap">
              <div class="progress-bar" id="progress-bar"></div>
            </div>
            <span id="upload-status-text">上传中…</span>
          </div>
        </div>

        <!-- Song list -->
        <div class="song-list-header">
          <h2>我的曲库</h2>
          <span id="library-count" class="count-badge">0 首</span>
        </div>
        <div id="library-list" class="song-list">
          <div class="empty-state">暂无歌曲，请上传音频文件</div>
        </div>
      </section>

      <!-- ============ SEARCH TAB ============ -->
      <section id="tab-search" class="tab-panel">
        <div class="search-bar-wrap">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="搜索歌曲、艺术家…"
            autocomplete="off"
          />
          <button id="search-btn" class="btn btn-primary">搜索</button>
        </div>

        <div id="search-results">
          <div class="search-section">
            <h3 class="section-title">我的曲库</h3>
            <div id="search-my-list" class="song-list">
              <div class="empty-state">输入关键词开始搜索</div>
            </div>
          </div>
          <div class="search-section">
            <h3 class="section-title">平台公共曲库</h3>
            <div id="search-platform-list" class="song-list">
              <div class="empty-state">输入关键词开始搜索</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ============ SONG DETAIL MODAL ============ -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" id="modal-close-btn" aria-label="关闭">✕</button>

      <div class="modal-header">
        <div class="modal-album-art">🎵</div>
        <div class="modal-meta">
          <h2 id="modal-title">—</h2>
          <p id="modal-artist" class="modal-artist">—</p>
          <div id="modal-status-badge" class="status-badge">—</div>
        </div>
      </div>

      <div class="modal-details">
        <div class="detail-grid">
          <div class="detail-item"><span class="detail-label">时长</span><span id="d-duration">—</span></div>
          <div class="detail-item"><span class="detail-label">格式</span><span id="d-format">—</span></div>
          <div class="detail-item"><span class="detail-label">采样率</span><span id="d-sample-rate">—</span></div>
          <div class="detail-item"><span class="detail-label">声道</span><span id="d-channels">—</span></div>
          <div class="detail-item"><span class="detail-label">比特率</span><span id="d-bitrate">—</span></div>
          <div class="detail-item"><span class="detail-label">来源</span><span id="d-source">—</span></div>
        </div>
      </div>

      <!-- Waveform canvas -->
      <div class="waveform-section">
        <div class="waveform-label">波形图</div>
        <div class="waveform-container">
          <canvas id="waveform-canvas" width="720" height="120"></canvas>
          <div id="waveform-placeholder" class="waveform-placeholder">波形生成中…</div>
        </div>
        <!-- Playhead indicator (visual only for platform/local without actual audio) -->
        <div class="playhead-row">
          <span id="current-time-display">0:00</span>
          <div class="seek-bar-wrap" id="seek-bar-wrap">
            <div class="seek-bar-bg">
              <div class="seek-bar-fill" id="seek-bar-fill"></div>
            </div>
          </div>
          <span id="duration-display">0:00</span>
        </div>
      </div>

      <!-- Audio player for real uploaded files -->
      <div class="player-section" id="player-section">
        <audio id="audio-player" preload="none"></audio>
        <div class="player-controls">
          <button class="player-btn" id="play-pause-btn" disabled>▶</button>
          <span class="player-time" id="player-time">0:00 / 0:00</span>
        </div>
        <p id="player-note" class="player-note hidden">（平台曲目仅展示元数据，无法播放）</p>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/static/app.js"></script>
</body>
</html>
